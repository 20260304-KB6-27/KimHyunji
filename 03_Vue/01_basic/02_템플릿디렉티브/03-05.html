<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Vue 연습</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>

  <body>
    <div id="app">
      <h3>취미생활</h3>

      <label><input type="checkbox" value="A" v-model="hobby" /> 운동</label>
      <label><input type="checkbox" value="B" v-model="hobby" /> 독서</label>
      <label><input type="checkbox" value="C" v-model="hobby" /> 음악</label>
      <label><input type="checkbox" value="D" v-model="hobby" /> 댄스</label>
      <label><input type="checkbox" value="E" v-model="hobby" /> 역사</label>

      <h3>상품 분류 선택</h3>

      <select v-model="category">
        <option value="C01">전자제품</option>
        <option value="C02">의류</option>
        <option value="C03">음식</option>
      </select>

      <hr />

      <div>선택한 취미: {{ hobby.join(', ') }}</div>
      <div>선택한 상품 분류: {{ category }}</div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const hobby = ref([]); // 체크박스 → 배열
          const category = ref(''); // select → 문자열

          return {
            hobby,
            category,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
