<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>v-model checkbox</title>
  </head>
  <body>
    <div id="app">
      위의 내용에 동의하십니까?
      <input
        type="checkbox"
        v-model="agree"
        true-value="yes"
        false-value="no"
      />
      <hr />

      <span>선택된 값 : {{ agree }}</span>
    </div>

    <script src="https://unpkg.com/vue@3"></script>
    <script>
      let vm = Vue.createApp({
        data() {
          return {
            agree: 'no', // 기본값 (체크 안된 상태)
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
