<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      금액: <input type="text" v-model.number="amount" /> <br />
      <button @click="balance+=parseInt(amount)">입금</button>
      <button @click="balance-=parseInt(amount)">인출</button> <br />
      <h3>계좌 잔고: [{{balance}}]</h3>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            amount: 0,
            balance: 0,
          };
        },
        methods: {},
      }).mount('#app');
    </script>
  </body>
</html>
