<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        let vm = Vue.createApp({
            name: "App",
            data() {
                return {
                    backgroundColor: "aqua",
                    color: "black",
                };
            },

            methods: {
                overEvent() {
                    this.backgroundColor = "purple";
                    this.color = "yellow";
                },
                outEvent(){
                    this.backgroundColor ="aqua";
                    this.color = "black";
                },
            },
        }).mount("#app");
    </script>
  </head>
  <body>
   <div id="app">
  <div @mouseover="parentOverEvent" @mouseout="parentOutEvent">
    <button
      :style="style1"
      @mouseover="overEvent"
      @mouseout="outEvent"
    >
      테스트
    </button>
  </div>
</div>

<script>
const { createApp, ref } = Vue;

createApp({
  setup() {
    const style1 = ref({
      backgroundColor: 'aqua',
      color: 'black',
    });

    const parentOverEvent = () => {
      console.log('parent Over Event');
    };

    const parentOutEvent = () => {
      console.log('parent Out Event');
    };

    const overEvent = () => {
      style1.value.backgroundColor = 'purple';
      style1.value.color = 'yellow';
    };

    const outEvent = (e) => {
      style1.value.backgroundColor = 'aqua';
      style1.value.color = 'black';
      e.stopPropagation();
    };

    return {
      style1,
      overEvent,
      outEvent,
      parentOverEvent,
      parentOutEvent,
    };
  },
}).mount('#app');
</script>
