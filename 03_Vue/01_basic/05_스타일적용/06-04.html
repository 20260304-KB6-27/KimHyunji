<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <button 버튼 :style="[myColor, myLayout]">버튼1</button>
    </div>
    <script src="https://unpkg.com/vue "></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            myColor: {
              backgroundColor: 'purple',
              color: 'yellow',
            },
            myLayout: {
              width: '150px',
              height: '80px',
              textAlign: 'center',
            },
          };
        },
      }).mount('#app');
    </script>

    <script>
      const { createApp } = Vue;

      createApp({
        setup() {
          return {};
        },
      }).mount('#app');
    </script>
  </body>
</html>
