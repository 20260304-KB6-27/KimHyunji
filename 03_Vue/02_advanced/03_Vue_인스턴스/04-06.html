<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      x : <input type="text" v-model.number="x" /> <br />
      y : <input type="text" v-model.number="y" /> <br />
      덧셈 결과 : {{sum}}
    </div>

    <script>
      const { createApp, ref, watch } = Vue;

      createApp({
        setup() {
          const x = ref(0);
          const y = ref(0);
          const sum = ref(0);

          watch(x, (current, old) => {
            console.log(`## x : ${old} --> ${current}`);
            var result = Number(current) + Number(y.value);
            if (isNaN(result)) sum.value = 0;
            else sum.value = result;
          });

          watch(y, (current, old) => {
            console.log(`## y : ${old} --> ${current}`);
            var result = Number(x.value) + Number(current);
            if (isNaN(result)) sum.value = 0;
            else sum.value = result;
          });

          return {
            x,
            y,
            sum,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
